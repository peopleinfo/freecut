name: Release Desktop App

# Trigger: push to main (merge)
on:
  push:
    branches:
      - main

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Step 1: Determine version & create draft release ───────
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Append short SHA for unique builds since version might not change every push
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_VERSION="${VERSION}+${SHORT_SHA}"
          echo "version=${BUILD_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${BUILD_VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Release version: ${BUILD_VERSION}"

      - name: Create GitHub Release (draft)
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: FreeCut ${{ steps.version.outputs.tag }}
          body: |
            ## FreeCut Desktop ${{ steps.version.outputs.tag }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows (Installer) | `FreeCut-Setup-*.exe` |
            | 🪟 Windows (Portable) | `FreeCut-*.exe` |
            | 🍎 macOS (Intel + Apple Silicon) | `FreeCut-*.dmg` |

            ### What's New
            _Auto-generated from merge to master._

            > **Note:** FFmpeg is required for GPU-accelerated exports.
            > You can download it directly from within the app via **Settings → FFmpeg → Download FFmpeg**.
            > The app will still work without FFmpeg, but exports will use browser-based encoding (slower).
          draft: true
          prerelease: false

  # ─── Step 2: Build on Windows ───────────────────────────────
  build-windows:
    name: Build Windows
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          cd backend
          uv sync

      - name: Build backend (PyInstaller)
        run: npm run build:backend

      - name: Build frontend
        run: npm run build

      - name: Build Electron (Windows)
        run: npx electron-builder --config electron-builder.json --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            release/*.exe
          retention-days: 5

      - name: Upload to Release — NSIS Installer
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.prepare.outputs.upload_url }}
          asset_path: release/FreeCut Setup ${{ needs.prepare.outputs.version }}.exe
          asset_name: FreeCut-Setup-${{ needs.prepare.outputs.version }}.exe
          asset_content_type: application/octet-stream
        continue-on-error: true

      - name: Upload to Release — Portable
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.prepare.outputs.upload_url }}
          asset_path: release/FreeCut ${{ needs.prepare.outputs.version }}.exe
          asset_name: FreeCut-Portable-${{ needs.prepare.outputs.version }}.exe
          asset_content_type: application/octet-stream
        continue-on-error: true

      # Fallback: upload all .exe files if exact names don't match
      - name: Upload all Windows executables (fallback)
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Step 3: Build on macOS ─────────────────────────────────
  build-macos:
    name: Build macOS
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          cd backend
          uv sync

      - name: Build backend (PyInstaller)
        run: npm run build:backend

      - name: Build frontend
        run: npm run build

      - name: Build Electron (macOS)
        run: npx electron-builder --config electron-builder.json --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            release/*.dmg
          retention-days: 5

      - name: Upload all macOS DMGs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Step 4: Publish the release (undraft) ──────────────────
  publish:
    name: Publish Release
    needs: [prepare, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (remove draft)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.prepare.outputs.release_id }},
              draft: false,
            });
            console.log('✅ Release published!');
